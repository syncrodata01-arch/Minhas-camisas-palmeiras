<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camisas Palmeiras Cris | Acervo Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --verde-palmeiras: #006437;
            --verde-escuro: #004d2a;
            --ouro: #c5a847;
            --branco: #ffffff;
            --gelo: #f0f2f5;
            --sombra: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--gelo);
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: 60%;
            background-blend-mode: overlay;
            margin: 0;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--verde-escuro), var(--verde-palmeiras));
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--ouro);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid rgba(197, 168, 71, 0.5);
            font-size: 0.9rem;
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 25px; }

        .toolbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-top: -50px;
            box-shadow: 0 10px 30px var(--sombra);
        }

        .search-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 12px 20px;
            border-radius: 30px;
            width: 200px;
            outline: none;
            transition: 0.3s;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: white;
        }

        .btn-add { background: var(--verde-palmeiras); }
        .btn-filter { background: var(--ouro); }
        .btn-backup { background: #3498db; }
        .btn-import { background: #9b59b6; }
        .btn-danger { background: #e74c3c; }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .filter-panel {
            display: none;
            background: white;
            margin-top: 15px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px var(--sombra);
            text-align: center;
        }

        .filter-chip {
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: none;
            cursor: pointer;
            margin: 4px;
            font-size: 0.8rem;
        }

        .filter-chip.active { background: var(--verde-palmeiras); color: white; border-color: var(--verde-palmeiras); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 8px 15px var(--sombra);
        }

        .card:hover { transform: translateY(-5px); }

        .img-container { width: 100%; height: 230px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 10px; cursor: pointer; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-content { padding: 15px; text-align: center; }
        .card-title { font-weight: 700; color: var(--verde-escuro); font-size: 1rem; display: block; outline: none; }
        .card-year { color: #888; font-size: 0.85rem; }

        .edit-overlay { background: #fdfdfd; padding: 12px; display: none; border-top: 1px solid #eee; font-size: 0.8rem; }
        .input-premium { width: 70px; padding: 5px; border-radius: 6px; border: 1px solid #ddd; text-align: center; margin: 4px; }

        .badge-count { position: absolute; top: 15px; left: 15px; background: var(--ouro); color: white; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.7rem; }
        .btn-del { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.8); border: none; border-radius: 50%; width: 28px; height: 28px; color: #ff4d4d; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Camisas Palmeiras Cris</h1>
    <div class="stats-bar">
        <div class="stat-card">👕 <b><span id="totalPeças">0</span></b> Itens</div>
        <div class="stat-card" onclick="togglePrivacidade()" style="cursor:pointer">💰 <b><span id="valorTotal">R$ ******</span></b></div>
    </div>
</header>

<div class="container">
    <div class="toolbar">
        <input type="text" id="inputBusca" oninput="renderizar()" placeholder="Pesquisar..." class="search-box">
        
        <button class="btn btn-filter" onclick="togglePainelFiltro()">⚡ Filtros</button>
        
        <label class="btn btn-add">
            ➕ Add <input type="file" id="uploadFotos" multiple style="display:none" accept="image/*">
        </label>
        
        <button class="btn btn-backup" onclick="fazerBackup()">💾 Backup</button>
        
        <label class="btn btn-import">
            📥 Importar <input type="file" id="inputImportar" style="display:none" accept=".json" onchange="importarBackup(event)">
        </label>

        <button class="btn btn-danger" onclick="limparTudo()">🗑️ Limpar</button>
    </div>

    <div id="painelFiltro" class="filter-panel">
        <button class="filter-chip active" onclick="aplicarFiltro('', this)">Todas</button>
        <button class="filter-chip" onclick="aplicarFiltro(' 1', this)">Camisa 1</button>
        <button class="filter-chip" onclick="aplicarFiltro(' 2', this)">Camisa 2</button>
        <button class="filter-chip" onclick="aplicarFiltro(' 3', this)">Camisa 3</button>
        <button class="filter-chip" onclick="aplicarFiltro('Goleiro', this)">Goleiro</button>
        <button class="filter-chip" onclick="aplicarFiltro('Polo', this)">Polo</button>
        <button class="filter-chip" onclick="aplicarFiltro('Treino', this)">Treino</button>
    </div>

    <div id="gridPrincipal" class="grid"></div>
</div>

<script>
    let bancoDados;
    let filtroCategoria = "";
    let mostrarDinheiro = false;

    // Inicializa IndexedDB
    const conexao = indexedDB.open("AcervoPalmeirasPremium", 1);
    conexao.onupgradeneeded = (e) => e.target.result.createObjectStore("camisas", { keyPath: "id" });
    conexao.onsuccess = (e) => { bancoDados = e.target.result; renderizar(); };

    function renderizar() {
        const grid = document.getElementById("gridPrincipal");
        grid.innerHTML = "";
        const busca = document.getElementById("inputBusca").value.toLowerCase();
        
        const tx = bancoDados.transaction("camisas", "readonly");
        tx.objectStore("camisas").getAll().onsuccess = (e) => {
            let lista = e.target.result;
            let totalQtd = 0, totalCash = 0;

            lista.sort((a, b) => a.nome.localeCompare(b.nome, undefined, { numeric: true }));

            lista.forEach((item) => {
                const matchBusca = item.nome.toLowerCase().includes(busca) || item.ano.includes(busca);
                const matchFiltro = filtroCategoria === "" || item.nome.toLowerCase().includes(filtroCategoria.toLowerCase());

                if (matchBusca && matchFiltro) {
                    totalQtd += (parseInt(item.qtd) || 1);
                    totalCash += (parseFloat(item.preco) || 0) * (parseInt(item.qtd) || 1);

                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <span class="badge-count">${item.qtd || 1}x</span>
                        <button class="btn-del" onclick="excluirItem('${item.id}')">✕</button>
                        <div class="img-container" onclick="toggleEdicao('${item.id}')">
                            <img src="${item.img}">
                        </div>
                        <div class="card-content">
                            <span class="card-title" contenteditable="true" onblur="editarInfo('${item.id}', 'nome', this.innerText)">${item.nome}</span>
                            <span class="card-year" contenteditable="true" onblur="editarInfo('${item.id}', 'ano', this.innerText)">${item.ano || '---'}</span>
                        </div>
                        <div id="edit-${item.id}" class="edit-overlay">
                            Qtd: <input type="number" class="input-premium" value="${item.qtd || 1}" onchange="editarInfo('${item.id}', 'qtd', this.value)">
                            R$: <input type="number" class="input-premium" value="${item.preco || 0}" onchange="editarInfo('${item.id}', 'preco', this.value)">
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
            document.getElementById("totalPeças").innerText = totalQtd;
            document.getElementById("valorTotal").innerText = mostrarDinheiro ? totalCash.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'}) : "R$ ******";
        };
    }

    function importarBackup(event) {
        const arquivo = event.target.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = function(e) {
            try {
                const dados = JSON.parse(e.target.result);
                if (confirm("Deseja importar " + dados.length + " camisas? Isso adicionará aos itens atuais.")) {
                    const tx = bancoDados.transaction("camisas", "readwrite");
                    const store = tx.objectStore("camisas");
                    dados.forEach(item => store.put(item));
                    tx.oncomplete = () => {
                        alert("Importação concluída com sucesso!");
                        renderizar();
                    };
                }
            } catch (erro) {
                alert("Erro ao ler o arquivo de backup.");
            }
        };
        leitor.readAsText(arquivo);
    }

    function fazerBackup() {
        const tx = bancoDados.transaction("camisas", "readonly");
        tx.objectStore("camisas").getAll().onsuccess = (e) => {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([JSON.stringify(e.target.result)], {type: 'application/json'}));
            link.download = 'backup_cris_palmeiras.json'; link.click();
        };
    }

    // Funções auxiliares
    function togglePainelFiltro() { const p = document.getElementById('painelFiltro'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; }
    function aplicarFiltro(t, b) { filtroCategoria = t; document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); b.classList.add('active'); renderizar(); }
    function togglePrivacidade() { mostrarDinheiro = !mostrarDinheiro; renderizar(); }
    function toggleEdicao(id) { const el = document.getElementById(`edit-${id}`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    function editarInfo(id, c, v) { const tx = bancoDados.transaction("camisas", "readwrite"); const store = tx.objectStore("camisas"); store.get(id).onsuccess = (e) => { const i = e.target.result; i[c] = v; store.put(i); if(c==='qtd'||c==='preco') setTimeout(renderizar, 500); }; }
    function excluirItem(id) { if(confirm("Excluir?")) { const tx = bancoDados.transaction("camisas", "readwrite"); tx.objectStore("camisas").delete(id); tx.oncomplete = () => renderizar(); } }
    function limparTudo() { if(confirm("Apagar TUDO?")) { const tx = bancoDados.transaction("camisas", "readwrite"); tx.objectStore("camisas").clear(); tx.oncomplete = () => renderizar(); } }

    // Upload e Compactação
    document.getElementById('uploadFotos').addEventListener('change', function(e) {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 700;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } }
                    else { if (h > MAX) { w *= MAX/h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const nova = { id: 'ID-' + Date.now() + Math.random().toString(36).substr(2, 5), nome: file.name.split('.')[0].toUpperCase(), img: canvas.toDataURL('image/jpeg', 0.8), qtd: 1, preco: 0, ano: file.name.match(/\d{4}/)?.[0] || "" };
                    const tx = bancoDados.transaction("camisas", "readwrite");
                    tx.objectStore("camisas").put(nova);
                    tx.oncomplete = () => renderizar();
                };
            };
        });
    });
</script>
</body>
</html>
